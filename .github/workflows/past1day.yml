name: Topic Feeds - Daily (1 day)

on:
  schedule:
    - cron: "15 6 * * *"   # daily 06:15 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector (daily)
        env:
          RUN_MODE: daily
          PAST_DAYS_DAILY: "1"
          MAX_ITEMS: "50"
          DUP_THRESHOLD: "0.60"
          MODEL_NAME: "all-MiniLM-L6-v2"
        run: |
          python your_script.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: topic-feeds-daily
          path: |
            data/topic_feeds_latest.xlsx
            data/daily/*.xlsx
            data/search_audit_*.xlsx
            data/google_news_dedup_*.xlsx
            data/google_news_dedup_audit_*.xlsx
