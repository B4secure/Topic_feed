name: Topic News Collector

on:
  schedule:
    - cron: "0 7 * * *"     # daily 07:00 UTC
    - cron: "0 7 * * 3"     # weekly Wednesday 07:00 UTC
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Choose run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

permissions:
  contents: write

concurrency:
  group: topic-news-collector
  cancel-in-progress: false

jobs:
  daily:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'daily')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script (daily)
        env:
          RUN_MODE: daily
          PAST_DAYS_DAILY: "1"
          PAST_DAYS_WEEKLY: "7"
          MAX_ITEMS: "50"
          DUP_THRESHOLD: "0.60"
          MODEL_NAME: "all-MiniLM-L6-v2"
        run: |
          python main.py

      - name: List output files
        run: |
          echo "==== data tree ===="
          ls -R data || true
          echo "==== docs tree ===="
          ls -R docs || true

      - name: Commit outputs (daily)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          files=()
          [ -f data/topic_feeds_latest.xlsx ] && files+=(data/topic_feeds_latest.xlsx)
          [ -f data/topic_feeds_rolling_7d.xlsx ] && files+=(data/topic_feeds_rolling_7d.xlsx)
          [ -f docs/feed.json ]         && files+=(docs/feed.json)
          [ -f docs/daily_feed.json ]   && files+=(docs/daily_feed.json)
          [ -f docs/weekly_feed.json ]  && files+=(docs/weekly_feed.json)

          shopt -s nullglob
          daily_files=(data/daily/*.xlsx)
          shopt -u nullglob

          if [ ${#daily_files[@]} -gt 0 ]; then
            files+=("${daily_files[@]}")
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "No output files found to commit."
            exit 0
          fi

          git add "${files[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update topic news feed (daily)"
          git pull --rebase origin main
          git push origin HEAD:main


  weekly:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * 3') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'weekly')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script (weekly)
        env:
          RUN_MODE: weekly
          PAST_DAYS_DAILY: "1"
          PAST_DAYS_WEEKLY: "7"
          MAX_ITEMS: "50"
          DUP_THRESHOLD: "0.60"
          MODEL_NAME: "all-MiniLM-L6-v2"
        run: |
          python main.py

      - name: List output files
        run: |
          echo "==== data tree ===="
          ls -R data || true
          echo "==== docs tree ===="
          ls -R docs || true

      - name: Commit outputs (weekly)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          files=()
          [ -f data/topic_feeds_latest.xlsx ] && files+=(data/topic_feeds_latest.xlsx)
          [ -f data/topic_feeds_rolling_7d.xlsx ] && files+=(data/topic_feeds_rolling_7d.xlsx)
          [ -f docs/feed.json ]         && files+=(docs/feed.json)
          [ -f docs/daily_feed.json ]   && files+=(docs/daily_feed.json)
          [ -f docs/weekly_feed.json ]  && files+=(docs/weekly_feed.json)

          shopt -s nullglob
          weekly_files=(data/weekly/*.xlsx)
          shopt -u nullglob

          if [ ${#weekly_files[@]} -gt 0 ]; then
            files+=("${weekly_files[@]}")
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "No output files found to commit."
            exit 0
          fi

          git add "${files[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update topic news feed (weekly)"
          git pull --rebase origin main
          git push origin HEAD:main
