name: Topic Feeds - Weekly (7 days)

on:
  schedule:
    - cron: "30 6 * * 3"   # Wednesday 06:30 UTC (3 = Wed)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector (weekly)
        env:
          RUN_MODE: weekly
          PAST_DAYS_WEEKLY: "7"
          MAX_ITEMS: "50"
          DUP_THRESHOLD: "0.60"
          MODEL_NAME: "all-MiniLM-L6-v2"
        run: |
          python your_script.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: topic-feeds-weekly
          path: |
            data/topic_feeds_latest.xlsx
            data/topic_feeds_rolling_7d.xlsx
            data/weekly/*.xlsx
            data/search_audit_*.xlsx
            data/google_news_dedup_*.xlsx
            data/google_news_dedup_audit_*.xlsx
